<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WASI MAILS | Private Temp Mail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        :root { --primary: #10b981; --primary-dark: #059669; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .emerald-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        .loader {
            width: 20px; height: 20px;
            border: 3px solid #FFF; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 overflow-hidden">

    <!-- Splash Screen -->
    <div id="splash" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="w-20 h-20 emerald-gradient rounded-3xl flex items-center justify-center mb-4 shadow-xl shadow-emerald-200">
            <span class="material-symbols-outlined text-white text-5xl">mail</span>
        </div>
        <h1 class="text-3xl font-bold tracking-tighter text-emerald-600">WASI MAILS</h1>
        <div class="mt-8 w-48 h-1 bg-gray-100 rounded-full overflow-hidden">
            <div class="h-full emerald-gradient animate-[progress_2s_ease-in-out_infinite]" style="width: 100%; transform-origin: left; animation: grow 2s forwards;"></div>
        </div>
    </div>

    <!-- Main App Layout -->
    <div class="h-screen flex flex-col max-w-md mx-auto bg-white shadow-2xl relative">
        
        <!-- Header -->
        <header class="px-6 py-5 flex items-center justify-between border-b border-gray-100 glass sticky top-0 z-10">
            <div>
                <h1 class="text-xl font-bold text-emerald-600 tracking-tight">WASI MAILS</h1>
                <p class="text-[10px] text-gray-400 font-medium uppercase tracking-widest">Premium Temp Mail</p>
            </div>
            <div id="status-dot" class="flex items-center gap-2 px-3 py-1 bg-emerald-50 rounded-full">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-bold text-emerald-700 uppercase">Live</span>
            </div>
        </header>

        <!-- Body -->
        <main class="flex-grow overflow-y-auto no-scrollbar px-6 py-6">
            
            <!-- Email Card -->
            <div class="bg-gray-900 rounded-[2rem] p-6 mb-6 shadow-2xl shadow-emerald-100 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 opacity-10">
                    <span class="material-symbols-outlined text-8xl text-white">alternate_email</span>
                </div>
                
                <label class="text-emerald-400 text-xs font-bold uppercase tracking-widest mb-2 block">Your Current Address</label>
                <div id="email-display" class="text-white text-lg font-semibold mb-6 break-all pr-4">
                    generating...
                </div>

                <div class="flex gap-3">
                    <button id="btn-copy" class="flex-grow bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-emerald-900/20">
                        <span class="material-symbols-outlined">content_copy</span>
                        Copy Address
                    </button>
                </div>
            </div>

            <!-- Controls -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button id="btn-new" class="bg-white border-2 border-gray-100 hover:border-emerald-200 p-4 rounded-2xl flex flex-col items-center gap-2 transition-all active:scale-95">
                    <div class="w-10 h-10 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-600">
                        <span class="material-symbols-outlined">refresh</span>
                    </div>
                    <span class="text-xs font-bold text-gray-600">New Mail</span>
                </button>
                <button id="btn-refresh" class="bg-white border-2 border-gray-100 hover:border-emerald-200 p-4 rounded-2xl flex flex-col items-center gap-2 transition-all active:scale-95">
                    <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-600">
                        <span class="material-symbols-outlined">sync</span>
                    </div>
                    <span class="text-xs font-bold text-gray-600">Refresh</span>
                </button>
            </div>

            <!-- Inbox Section -->
            <div class="mb-20">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-lg flex items-center gap-2">
                        Inbox 
                        <span id="mail-count" class="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-md">0</span>
                    </h3>
                    <span id="countdown" class="text-xs font-mono text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md">10:00</span>
                </div>

                <div id="inbox-container" class="space-y-4">
                    <!-- Empty State -->
                    <div id="empty-state" class="py-12 flex flex-col items-center justify-center text-gray-300">
                        <span class="material-symbols-outlined text-6xl mb-2">forward_to_inbox</span>
                        <p class="text-sm font-medium">Waiting for incoming mail...</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Message Viewer Modal -->
        <div id="viewer" class="fixed inset-0 z-50 bg-white translate-y-full transition-transform duration-500 flex flex-col">
            <header class="p-4 border-b flex items-center gap-4">
                <button onclick="closeViewer()" class="p-2 hover:bg-gray-100 rounded-full">
                    <span class="material-symbols-outlined">close</span>
                </button>
                <h2 class="font-bold truncate" id="view-subject">Subject</h2>
            </header>
            <div class="p-6 flex-grow overflow-y-auto no-scrollbar">
                <div class="mb-6 pb-6 border-b border-gray-100">
                    <p class="text-xs text-gray-400 uppercase font-bold mb-1">From</p>
                    <p id="view-sender" class="font-bold text-emerald-600"></p>
                </div>
                <div id="view-body" class="prose prose-emerald">
                    <iframe id="mail-frame" class="w-full h-[500px] border-0"></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl transition-all opacity-0 pointer-events-none">
        Copied to Clipboard
    </div>

    <script>
        // Configuration
        const API_KEY = 'sk_gMBHaT5HFUyIUEVa_obqZOB5GSD2FN8gU0hstewROBbNRJVinjRbp86PINN6wBqKJvcHzBTY2k5WNxELo';
        const BASE_URL = 'https://api.mailslurp.com';
        
        let state = {
            inboxId: null,
            email: null,
            timer: 600
        };

        // --- CORE FUNCTIONS ---

        async function createNewInbox() {
            setLoading('btn-new', true);
            try {
                const response = await fetch(`${BASE_URL}/inboxes`, {
                    method: 'POST',
                    headers: { 'x-api-key': API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ expiresIn: 600000 })
                });
                const data = await response.json();
                state.inboxId = data.id;
                state.email = data.emailAddress;
                state.timer = 600;
                
                document.getElementById('email-display').innerText = state.email;
                document.getElementById('inbox-container').innerHTML = document.getElementById('empty-state').outerHTML;
                document.getElementById('mail-count').innerText = '0';
                
                startTimer();
                showToast("New Email Generated");
            } catch (err) {
                showToast("Connection Error");
            }
            setLoading('btn-new', false);
        }

        async function checkEmails() {
            if(!state.inboxId) return;
            try {
                const response = await fetch(`${BASE_URL}/inboxes/${state.inboxId}/emails?sort=DESC`, {
                    headers: { 'x-api-key': API_KEY }
                });
                const emails = await response.json();
                renderInbox(emails);
            } catch (err) { console.error(err); }
        }

        function renderInbox(emails) {
            const container = document.getElementById('inbox-container');
            document.getElementById('mail-count').innerText = emails.length;

            if(emails.length === 0) return;

            container.innerHTML = emails.map(mail => `
                <div onclick="viewMail('${mail.id}')" class="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm hover:border-emerald-300 transition-all cursor-pointer animate-slide-up">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-tighter">New Message</span>
                        <span class="text-[10px] text-gray-400">${new Date(mail.createdAt).toLocaleTimeString()}</span>
                    </div>
                    <h4 class="font-bold text-gray-800 truncate mb-1">${mail.subject || '(No Subject)'}</h4>
                    <p class="text-xs text-gray-500 truncate">From: ${mail.from || 'Unknown'}</p>
                </div>
            `).join('');
        }

        async function viewMail(id) {
            const viewer = document.getElementById('viewer');
            viewer.classList.remove('translate-y-full');
            
            try {
                const res = await fetch(`${BASE_URL}/emails/${id}`, { headers: { 'x-api-key': API_KEY } });
                const mail = await res.json();
                
                document.getElementById('view-subject').innerText = mail.subject;
                document.getElementById('view-sender').innerText = mail.from;
                document.getElementById('mail-frame').srcdoc = mail.body;
            } catch (err) { showToast("Failed to load body"); }
        }

        function closeViewer() {
            document.getElementById('viewer').classList.add('translate-y-full');
        }

        // --- TRIPLE-LAYER COPY FIX ---
        function copyEmail() {
            const text = state.email;
            if(!text || text === "generating...") return;

            // Layer 1: Modern API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast("Copied Successfully"));
            } 
            else {
                // Layer 2: Invisible Input Method (Best for Mobile)
                const input = document.createElement('input');
                input.value = text;
                input.style.position = 'fixed';
                input.style.opacity = '0';
                document.body.appendChild(input);
                input.focus();
                input.select();
                input.setSelectionRange(0, 99999); // For mobile
                try {
                    document.execCommand('copy');
                    showToast("Copied Successfully");
                } catch (err) {
                    // Layer 3: Direct Prompt (Last Resort)
                    window.prompt("Copy your email:", text);
                }
                document.body.removeChild(input);
            }
        }

        // --- UTILS ---

        function startTimer() {
            clearInterval(window.itv);
            window.itv = setInterval(() => {
                state.timer--;
                if(state.timer <= 0) {
                    clearInterval(window.itv);
                    createNewInbox();
                    return;
                }
                let m = Math.floor(state.timer / 60);
                let s = state.timer % 60;
                document.getElementById('countdown').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            }, 1000);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => t.classList.add('opacity-0', 'pointer-events-none'), 2000);
        }

        function setLoading(id, isLoading) {
            const btn = document.getElementById(id);
            if(isLoading) {
                btn.dataset.old = btn.innerHTML;
                btn.innerHTML = '<span class="loader"></span>';
                btn.disabled = true;
            } else {
                btn.innerHTML = btn.dataset.old;
                btn.disabled = false;
            }
        }

        // --- INIT ---

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').classList.add('opacity-0');
                setTimeout(() => document.getElementById('splash').remove(), 700);
            }, 2000);

            createNewInbox();
            setInterval(checkEmails, 5000); // Auto refresh every 5s
        };

        // Event Listeners
        document.getElementById('btn-copy').onclick = copyEmail;
        document.getElementById('btn-new').onclick = createNewInbox;
        document.getElementById('btn-refresh').onclick = checkEmails;
    </script>
</body>
                        </html>
